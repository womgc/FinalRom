name: xdelta3_ffi
description: "FFI bindings to the native xdelta3 (VCDIFF) library for applying .xdelta ROM patches."
version: 0.0.1
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      windows:
        ffiPlugin: true
