org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# AGP 8.x: the built-in-Kotlin / new-DSL path is AGP 9 only and is not used here.
# On AGP 8 the standalone Kotlin Gradle Plugin compiles Kotlin (the app and
# plugins like file_picker apply it the standard way), so these stay off.
android.newDsl=false
android.builtInKotlin=false
