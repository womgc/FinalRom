name: Build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows

      - name: Zip Windows build
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath final-rom-windows.zip

      - name: Upload Windows Build
        uses: actions/upload-artifact@v5
        with:
          name: final-rom-windows
          path: final-rom-windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux

      - name: Zip Linux build
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../final-rom-linux.zip .

      - name: Upload Linux Build
        uses: actions/upload-artifact@v5
        with:
          name: final-rom-linux
          path: final-rom-linux.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos

      - name: Zip macOS app
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --keepParent final_rom.app final-rom-macos.zip

      - name: Upload macOS Build
        uses: actions/upload-artifact@v5
        with:
          name: final-rom-macos
          path: build/macos/Build/Products/Release/final-rom-macos.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk

      - name: Rename Android APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/final-rom-android.apk

      - name: Upload Android Build
        uses: actions/upload-artifact@v5
        with:
          name: final-rom-android-apk
          path: build/app/outputs/flutter-apk/final-rom-android.apk

  release:
    needs: [build-android, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v5
        with:
          name: final-rom-android-apk

      - name: Download macOS app
        uses: actions/download-artifact@v5
        with:
          name: final-rom-macos

      - name: Download Windows build
        uses: actions/download-artifact@v5
        with:
          name: final-rom-windows

      - name: Download Linux build
        uses: actions/download-artifact@v5
        with:
          name: final-rom-linux

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            final-rom-android.apk
            final-rom-macos.zip
            final-rom-windows.zip
            final-rom-linux.zip
